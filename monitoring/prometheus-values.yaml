# ─── Prometheus Stack Configuration ───────────────────────────────────────
# Installed via Helm: prometheus-community/kube-prometheus-stack

grafana:
  enabled: true
  adminPassword: "eks-demo-admin"

  service:
    type: LoadBalancer
    port: 80

  # ✅ Added resource limits
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "150m"

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: "default"
        orgId: 1
        folder: "EKS Demo"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

  dashboardsConfigMaps:
    default: "grafana-dashboards"

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/"
    auth.anonymous:
      enabled: false

prometheus:
  enabled: true

  service:
    type: ClusterIP

  prometheusSpec:
    retention: 24h
    retentionSize: "5GB"
    scrapeInterval: "15s"
    evaluationInterval: "15s"
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # ✅ Added resource limits
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "300m"

    additionalScrapeConfigs:
    - job_name: "demo-app"
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["default"]
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: (.+)
        replacement: "${1}"
      - source_labels: [__address__,
                        __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: "([^:]+)(?::\\d+)?;(\\d+)"
        replacement: "$1:$2"
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: replace
        target_label: app

    - job_name: "kubernetes-nodes"
      kubernetes_sd_configs:
      - role: node
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

# ✅ alertmanager was disabled — just added resources block (won't be used but safe to have)
alertmanager:
  enabled: false

# ─── Disabled heavy control-plane components (not accessible in EKS anyway)
# ✅ Added
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false

# ✅ Added
prometheusOperator:
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true