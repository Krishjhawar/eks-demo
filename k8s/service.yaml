apiVersion: v1
kind: Service
metadata:
  name: demo-app-service
  namespace: default
  labels:
    app: demo-app
  annotations:
    # Tells AWS to create an internet-facing load balancer
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    # Prometheus discovers this service
    prometheus.io/scrape: "true"
    prometheus.io/port:   "3000"
    prometheus.io/path:   "/metrics"
spec:
  type: LoadBalancer
  selector:
    app: demo-app        # matches pods with this label
  ports:
  - name:       http
    protocol:   TCP
    port:       80       # external port (what your friends open)
    targetPort: 3000     # internal pod port